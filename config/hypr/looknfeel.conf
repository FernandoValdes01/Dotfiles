# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    # gaps_in = 0
    # gaps_out = 0

    # Use master layout instead of dwindle
    # layout = master

    border_size = 2
    col.active_border = rgba(f2ebe3ff)
    col.inactive_border = rgba(444444aa)
}

decoration {
    rounding = 18

    blur {
        enabled = true
        size = 10
        passes = 4
        special = true
        brightness = 0.82
        contrast = 0.95
    }

    shadow {
        color = rgba(050705aa)
        range = 14
        render_power = 3
    }
}
